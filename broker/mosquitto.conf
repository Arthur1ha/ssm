# SSM Mosquitto Broker Configuration

# TCP listener for ESP32 (port 1883)
listener 1883
allow_anonymous true

# WebSocket listener for PWA (port 9001)
listener 9001
protocol websockets
allow_anonymous true

# Persistence (retain messages survive restarts)
persistence true
persistence_location C:\Users\24225\Desktop\SSM\broker\data\
retained_persistence true

# Logging
log_dest stdout
log_dest file C:\Users\24225\Desktop\SSM\broker\logs\mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# Connection settings
max_keepalive 120
