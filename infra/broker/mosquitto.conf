# SSM Mosquitto Broker Configuration

# Authentication
password_file /home/eliott/ssm/broker/passwd
allow_anonymous false

# TCP listener for ESP32 (port 1883)
listener 1883

# WebSocket listener for PWA (port 9001)
listener 9001
protocol websockets

# Persistence (retain messages survive restarts)
persistence true
persistence_location /home/eliott/ssm/broker/data/
retained_persistence true

# Logging
log_dest stdout
log_dest file /home/eliott/ssm/broker/logs/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# Connection settings
max_keepalive 120
