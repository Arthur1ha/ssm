<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0B0B0E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SSM · Nearby</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://unpkg.com/mqtt@5.3.4/dist/mqtt.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body { background: #0B0B0E; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 0; height: 0; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .35; transform: scale(1.6); }
    }
    @keyframes dotbounce {
      0%, 80%, 100% { opacity: .25; transform: translateY(0); }
      40%            { opacity: 1;   transform: translateY(-3px); }
    }
    .typing-dot {
      display: inline-block;
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.45);
      animation: dotbounce 1.1s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <!-- Core MQTT modules (plain JS, available as globals before React boots) -->
  <script src="src/MqttBus.js"></script>
  <script src="src/AgentRegistry.js"></script>
  <script src="src/ISMTracker.js"></script>

  <div id="root"></div>

  <script type="text/babel" src="src/pages/Go2Page.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>

</body>
</html>
